name: Build Debug APKs

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    name: Build Debug Builds
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        flavor: [Colombia, Uganda, Nigeria]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Create secrets.properties
        run: |
          echo "POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }}" >> secrets.properties
          echo "POSTHOG_HOST=${{ secrets.POSTHOG_HOST }}" >> secrets.properties
          echo "DEBUG_VECTORCAM_API_KEY=${{ secrets.DEBUG_VECTORCAM_API_KEY }}" >> secrets.properties
          echo "RELEASE_VECTORCAM_API_KEY=${{ secrets.RELEASE_VECTORCAM_API_KEY }}" >> secrets.properties
      
      - name: Build ${{ matrix.flavor }} Debug APK
        run: ./gradlew assemble${{ matrix.flavor }}Debug --stacktrace
      
      - name: Run unit tests for ${{ matrix.flavor }}
        run: ./gradlew test${{ matrix.flavor }}DebugUnitTest
      
      - name: Upload ${{ matrix.flavor }} Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.flavor }}-debug
          path: app/build/outputs/apk/${{ matrix.flavor | lower }}/debug/app-${{ matrix.flavor | lower }}-debug.apk
          retention-days: 30
      
      - name: Upload test results for ${{ matrix.flavor }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.flavor }}
          path: app/build/test-results/
          retention-days: 7

  # Optional: Create a combined summary
  summary:
    name: Build Summary
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Create build summary
        run: |
          echo "## 🎉 Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Debug APKs Built:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          for flavor in app-Colombia-debug app-Uganda-debug app-Nigeria-debug; do
            if [ -d "$flavor" ]; then
              apk=$(find "$flavor" -name "*.apk" -type f)
              if [ -n "$apk" ]; then
                size=$(du -h "$apk" | cut -f1)
                echo "- ✅ **${flavor}** - Size: $size" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 Download artifacts from the Actions tab." >> $GITHUB_STEP_SUMMARY
