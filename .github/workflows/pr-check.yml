name: PR Check - Build Debug APKs

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Build ${{ matrix.flavor }} Debug
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        flavor: [Colombia, Uganda, Nigeria]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Grant execute permission
        run: chmod +x gradlew
      
      - name: Create secrets.properties
        run: |
          echo "POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }}" >> secrets.properties
          echo "POSTHOG_HOST=${{ secrets.POSTHOG_HOST }}" >> secrets.properties
          echo "DEBUG_VECTORCAM_API_KEY=${{ secrets.DEBUG_VECTORCAM_API_KEY }}" >> secrets.properties
          echo "RELEASE_VECTORCAM_API_KEY=${{ secrets.RELEASE_VECTORCAM_API_KEY }}" >> secrets.properties
      
      - name: Build ${{ matrix.flavor }} Debug
        run: ./gradlew assemble${{ matrix.flavor }}Debug --no-daemon
      
      - name: Run Lint
        run: ./gradlew lint${{ matrix.flavor }}Debug
      
      - name: Run Tests
        run: ./gradlew test${{ matrix.flavor }}DebugUnitTest
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.flavor }}-debug-pr${{ github.event.pull_request.number }}
          path: app/build/outputs/apk/${{ matrix.flavor | lower }}/debug/*.apk
      
      - name: Upload Lint Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results-${{ matrix.flavor }}
          path: app/build/reports/lint-results-*.html

  comment-pr:
    name: Comment PR Results
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Post comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const flavors = ['Colombia', 'Uganda', 'Nigeria'];
            const buildStatus = '${{ needs.build.result }}';
            const emoji = buildStatus === 'success' ? '✅' : '❌';
            
            let comment = `## ${emoji} Build Status: ${buildStatus}\n\n`;
            comment += `**PR:** #${{ github.event.pull_request.number }}\n`;
            comment += `**Branch:** \`${{ github.head_ref }}\`\n`;
            comment += `**Commit:** ${{ github.sha }}\n\n`;
            comment += `### 📦 Debug APKs\n\n`;
            
            if (buildStatus === 'success') {
              flavors.forEach(flavor => {
                comment += `- ✅ **${flavor}** - Built successfully\n`;
              });
              comment += `\n💾 Download from workflow artifacts.\n`;
            } else {
              comment += `Build failed. Check the workflow logs for details.\n`;
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
