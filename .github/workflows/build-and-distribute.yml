name: Build and Distribute Debug APKs

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      distribute:
        description: 'Distribute to Firebase'
        required: false
        default: 'true'
        type: boolean

jobs:
  build-and-distribute:
    name: Build ${{ matrix.flavor }} Debug
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        flavor: [Colombia, Uganda, Nigeria]
        include:
          - flavor: Colombia
            tester_groups: colombia-testers
          - flavor: Uganda
            tester_groups: uganda-testers
          - flavor: Nigeria
            tester_groups: nigeria-testers
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Get full history for changelog
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Create secrets.properties
        run: |
          cat > secrets.properties << EOF
          POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST=${{ secrets.POSTHOG_HOST }}
          DEBUG_VECTORCAM_API_KEY=${{ secrets.DEBUG_VECTORCAM_API_KEY }}
          RELEASE_VECTORCAM_API_KEY=${{ secrets.RELEASE_VECTORCAM_API_KEY }}
          EOF
      
      - name: Decode and setup keystore (if exists)
        if: secrets.KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks
      
      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Build ${{ matrix.flavor }} Debug APK
        run: |
          ./gradlew assemble${{ matrix.flavor }}Debug \
            --stacktrace \
            --no-daemon \
            --warning-mode all
      
      - name: Run unit tests
        run: ./gradlew test${{ matrix.flavor }}DebugUnitTest --continue
      
      - name: Generate test report
        if: always()
        run: |
          ./gradlew test${{ matrix.flavor }}DebugUnitTest --continue || true
      
      - name: Get APK info
        id: apk_info
        run: |
          APK_PATH="app/build/outputs/apk/${{ matrix.flavor | lower }}/debug/app-${{ matrix.flavor | lower }}-debug.apk"
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          VERSION_NAME=$(grep "versionName" app/build.gradle.kts | grep "${{ matrix.flavor | lower }}" -A 2 | grep "versionName" | cut -d'"' -f2 | head -1)
          VERSION_CODE=$(grep "versionCode" app/build.gradle.kts | grep "${{ matrix.flavor | lower }}" -A 1 | grep "versionCode" | cut -d'=' -f2 | tr -d ' ' | head -1)
          
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
      
      - name: Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(git log --pretty=format:"- %s (%an)" -10)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: VectorCam-${{ matrix.flavor }}-${{ github.run_number }}-debug
          path: ${{ steps.apk_info.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.flavor }}
          path: |
            app/build/test-results/
            app/build/reports/tests/
          retention-days: 7
      
      - name: Distribute to Firebase App Distribution
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.distribute == 'true')
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: ${{ matrix.tester_groups }}
          file: ${{ steps.apk_info.outputs.apk_path }}
          releaseNotes: |
            🎉 VectorCam ${{ matrix.flavor }} Debug Build
            
            📱 Version: ${{ steps.apk_info.outputs.version_name }} (${{ steps.apk_info.outputs.version_code }})
            🏗️ Build: #${{ github.run_number }}
            🔀 Branch: ${{ github.ref_name }}
            👤 By: ${{ github.actor }}
            
            📝 Recent Changes:
            ${{ steps.changelog.outputs.changelog }}
      
      - name: Comment on PR with APK info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const flavor = '${{ matrix.flavor }}';
            const size = '${{ steps.apk_info.outputs.apk_size }}';
            const version = '${{ steps.apk_info.outputs.version_name }}';
            const versionCode = '${{ steps.apk_info.outputs.version_code }}';
            
            const body = `
            ## 📱 ${flavor} Debug APK Built Successfully!
            
            **Version:** ${version} (${versionCode})
            **Size:** ${size}
            **Build:** #${{ github.run_number }}
            
            ⬇️ Download from the **Artifacts** section in this workflow run.
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  summary:
    name: Build Summary
    needs: build-and-distribute
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create comprehensive summary
        run: |
          echo "# 🚀 VectorCam Debug Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build #:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## 📦 Debug APKs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Flavor | Status | Size | Download |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|------|----------|" >> $GITHUB_STEP_SUMMARY
          
          cd artifacts
          for dir in VectorCam-*-debug; do
            if [ -d "$dir" ]; then
              flavor=$(echo "$dir" | cut -d'-' -f2)
              apk=$(find "$dir" -name "*.apk" -type f | head -1)
              
              if [ -n "$apk" ]; then
                size=$(du -h "$apk" | cut -f1)
                echo "| $flavor | ✅ Success | $size | 📥 Available |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| $flavor | ❌ Failed | - | - |" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          for test_dir in test-results-*; do
            if [ -d "$test_dir" ]; then
              flavor=$(echo "$test_dir" | cut -d'-' -f3)
              echo "- **$flavor:** Tests completed" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "💡 **Tip:** Download APKs from the *Artifacts* section above." >> $GITHUB_STEP_SUMMARY
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::One or more builds failed. Check the logs above."
