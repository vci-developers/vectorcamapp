name: CI Checks

on:
  pull_request:
    branches: [ "develop" ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint - ${{ matrix.flavor }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [Uganda, Colombia, Nigeria, Kenya, Ghana]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Detekt
        run: ./gradlew detekt

      - name: Run lint for ${{ matrix.flavor }}
        run: ./gradlew lint${{ matrix.flavor }}Debug

      - name: Upload Detekt report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report-${{ matrix.flavor }}
          path: app/build/reports/detekt/

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ matrix.flavor }}
          path: app/build/reports/lint-results-*.html

  unit-tests:
    name: Unit Tests - ${{ matrix.flavor }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [Uganda, Colombia, Nigeria, Kenya, Ghana]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run unit tests for ${{ matrix.flavor }}
        run: ./gradlew test${{ matrix.flavor }}DebugUnitTest

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report-${{ matrix.flavor }}
          path: app/build/reports/tests/test${{ matrix.flavor }}DebugUnitTest/

